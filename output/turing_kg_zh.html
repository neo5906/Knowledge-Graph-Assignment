    <body>
        <div class="card" style="width: 100%">

        </div>

        
        

        <script type="text/javascript">

              // initialize global variables.
              var edges;
              var nodes;
              var allNodes;
              var allEdges;
              var nodeColors;
              var originalNodes;
              var network;
              var container;
              var options, data;
              var filter = {
                  item : '',
                  property : '',
                  value : []
              };

              

              

              // This method is responsible for drawing the graph, returns the drawn network
              function drawGraph() {
                  var container = document.getElementById('mynetwork');

                  

                  // parsing and collecting nodes and edges from the python
                  nodes = new vis.DataSet([{"color": "#FFA07A", "font": {"color": "black"}, "id": "\u963f\u9686\u4f50\u00b7\u4e18\u5947", "label": "\u963f\u9686\u4f50\u00b7\u4e18\u5947", "shape": "dot", "title": "\u7c7b\u578b: PERSON"}, {"color": "#DDA0DD", "font": {"color": "black"}, "id": "\u81ea\u52a8\u8ba1\u7b97\u673a", "label": "\u81ea\u52a8\u8ba1\u7b97\u673a", "shape": "dot", "title": "\u7c7b\u578b: CONCEPT"}, {"color": "#DDA0DD", "font": {"color": "black"}, "id": "\u6069\u5c3c\u683c\u739b\u5bc6\u7801\u673a", "label": "\u6069\u5c3c\u683c\u739b\u5bc6\u7801\u673a", "shape": "dot", "title": "\u7c7b\u578b: CONCEPT"}]);
                  edges = new vis.DataSet([]);

                  nodeColors = {};
                  allNodes = nodes.get({ returnType: "Object" });
                  for (nodeId in allNodes) {
                    nodeColors[nodeId] = allNodes[nodeId].color;
                  }
                  allEdges = edges.get({ returnType: "Object" });
                  // adding nodes and edges to the graph
                  data = {nodes: nodes, edges: edges};

                  var options = {"physics": {"enabled": true, "stabilization": {"iterations": 200}, "repulsion": {"nodeDistance": 200, "centralGravity": 0.2}}};

                  


                  

                  network = new vis.Network(container, data, options);

                  

                  

                  


                  

                  return network;

              }
              drawGraph();
        </script>
